---
engines:
  duplication:
    minTokenMatch: 20
    skipLexicalErrors: false
    ignoreLiterals: false
    ignoreIdentifiers: true
    ignoreAnnotations: false
    ignoreUsings: false
exclude_paths:
  - config/release-state.json
  - .agents/
  - .fallow/
  - .vscode/
  - .gh-pages/
  - .rumdl_cache/
  - .turbo/
  - coverage/
  - dist/
  - node_modules/
  - plan/
include_paths:
  - packages/**
