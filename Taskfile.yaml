# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  check-types:
    desc: Check types
    cmds:
      - ./node_modules/.bin/tsc --noEmit
    silent: false

  lint:
    desc: Run linter
    cmds:
      - ./node_modules/.bin/oxlint .
    silent: false

  lint-fix:
    desc: Run linter with auto-fix
    cmds:
      - ./node_modules/.bin/oxlint . --fix
    silent: false

  check-formatting:
    desc: Check formatting
    cmds:
      - ./node_modules/.bin/oxfmt . --check
    silent: false

  check-all:
    desc: Run all checks
    cmds:
      - task: check-types
      - task: lint
      - task: check-formatting
    silent: false

  compile:
    desc: Compile the package
    env:
      NODE_ENV: production
    cmds:
      - ./node_modules/.bin/tsup
    silent: false

  format:
    desc: Format code
    cmds:
      - ./node_modules/.bin/oxfmt . --write
    silent: false

  formatting:
    desc: Format code (alias)
    cmds:
      - task: format
    silent: false

  unit-tests:
    desc: Run unit tests
    cmds:
      - ./node_modules/.bin/vitest run src {{.CLI_ARGS}}
    silent: false

  unit-test-coverage:
    desc: Run unit tests with coverage
    cmds:
      - ./node_modules/.bin/vitest run src --coverage {{.CLI_ARGS}}
    silent: false

  precommit:
    desc: Run pre-commit checks
    deps: [check-types]
    cmds:
      - task: lint-fix
      - task: format
    silent: false

  test-all:
    desc: Run all tests
    cmds:
      - task: unit-tests
    silent: false

  release:
    desc: Release the package
    deps: [compile]
    cmds:
      - ./node_modules/.bin/zx ./scripts/release.js {{.CLI_ARGS}}
    silent: false

  test-build-release:
    desc: Test, Build & Release
    deps: [check-all, test-all]
    cmds:
      - task: release
    silent: false

  watch:
    desc: Watch for changes and recompile
    cmds:
      - ./node_modules/.bin/tsup --watch
    silent: false

  docs:dev:
    desc: Start documentation dev server
    cmds:
      - ./node_modules/.bin/vitepress dev docs
    silent: false

  docs:build:
    desc: Build documentation
    cmds:
      - ./node_modules/.bin/vitepress build docs
    silent: false

  docs:preview:
    desc: Preview built documentation
    cmds:
      - ./node_modules/.bin/vitepress preview docs
    silent: false
