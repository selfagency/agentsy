# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  check-types:
    desc: Check types
    cmds:
      - ./node_modules/.bin/tsc --noEmit
    silent: false

  lint:
    desc: Run linter
    cmds:
      - ./node_modules/.bin/oxlint .
    silent: false

  lint-fix:
    desc: Run linter with auto-fix
    cmds:
      - ./node_modules/.bin/oxlint . --fix
    silent: false

  check-formatting:
    desc: Check formatting
    cmds:
      - ./node_modules/.bin/oxfmt . --check
    silent: false

  check-all:
    desc: Run all checks
    cmds:
      - task: check-types
      - task: lint
      - task: check-formatting
    silent: false

  format:
    desc: Format code
    cmds:
      - ./node_modules/.bin/oxfmt . --write
    silent: false

  unit-tests:
    desc: Run unit tests
    cmds:
      - ./node_modules/.bin/vitest run src {{.CLI_ARGS}}
    silent: false

  unit-test-coverage:
    desc: Run unit tests with coverage
    cmds:
      - ./node_modules/.bin/vitest run src --coverage {{.CLI_ARGS}}
    silent: false

  precommit:
    desc: Run pre-commit checks
    deps: [check-types]
    cmds:
      - task: lint-fix
      - task: format
    silent: false

  test-all:
    desc: Run all tests
    cmds:
      - task: unit-tests
    silent: false

  build:
    desc: Build the project
    cmds:
      - ./node_modules/.bin/vite build
    silent: false

  dev:
    desc: Watch for changes and recompile
    cmds:
      - ./node_modules/.bin/vite --watch
    silent: false
