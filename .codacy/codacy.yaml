---
# Codacy configuration for @selfagency/llm-stream-parser
# TypeScript ESM streaming parser library
# Node.js 22+ required, 526 tests with vitest

# Global file exclusions
exclude_paths:
  - .agents/**
  - .beans/**
  - .codacy/**
  - .coverage/**
  - .gh-pages/**
  - dist/**
  - node_modules/**
  - '**/*.test.ts' # Exclude tests from complexity analysis
  - '**/*.spec.ts' # Exclude specs from complexity analysis

# Runtimes needed for analysis (Node.js only for this TypeScript project)
runtimes:
  - node@22.2.0

# Tools for static analysis
tools:
  - eslint@8.57.0
  - lizard@1.17.31
  - opengrep@1.16.4
  - trivy@0.69.3

# Tool-specific configurations
engines:
  # Lizard: Complexity metrics
  # Adjusted thresholds: complexity limit increased to match real-world patterns
  metric:
    config:
      languages:
        - typescript
        - javascript

  # ESLint: Already using Biome in the project for linting,
  # but Codacy can also run ESLint for additional checks
  eslint-8:
    exclude_paths:
      - dist/**
      - node_modules/**

# Language configuration
languages:
  javascript:
    enabled: true
    extensions:
      - '.js'
      - '.mjs'
      - '.cjs'
  typescript:
    enabled: true
    extensions:
      - '.ts'
      - '.tsx'
      - '.mts'
      - '.cts'
