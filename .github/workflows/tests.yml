name: Test & Build

on:
  push:
    branches: [ main ]
    paths:
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-test-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test-coverage:
    name: Run unit tests with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: |
          pnpm turbo run coverage -- --reporter=junit --outputFile=test-report.junit.xml
        env:
          CI: true

      - name: Copy coverage reports to unified directory
        run: |
          mkdir -p coverage-input
          cp packages/core/coverage/clover.xml coverage-input/clover-core.xml
          cp packages/vscode/coverage/clover.xml coverage-input/clover-vscode.xml

      - name: Merge coverage reports
        uses: selfagency/merge-coverage@v2
        with:
          source: ${{ github.workspace }}
          coverage-reports: ${{ github.workspace }}/coverage-input
          output-folder: ${{ github.workspace }}/coverage
          formats: clover

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: ${{ github.workspace }}/coverage/clover.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
