name: Test & Build

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "scripts/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "plan/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "plan/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-test-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow - Codebase Intelligence
    
    steps:
       - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild
               
      - name: Fallow
        uses: fallow-rs/fallow@v2.89.0
        with:
          command: audit
          annotations: true
          comment: true
          review-comments: true
          review-guidance: false
          diff-filter: added
          max-comments: 50
        
  unit-test-coverage:
    name: Run unit tests with coverage
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild

      - name: Run release tooling tests
        run: pnpm test:release
        env:
          CI: true

      - name: Run unit tests with coverage and JUNIT
        run: |
          pnpm turbo run coverage -- \
            --coverage.reporter=json \
            --coverage.reporter=lcov \
            --coverage.reporter=text \
            --reporter=junit \
            --outputFile.junit=test-report.junit.xml
        env:
          CI: true
        continue-on-error: false

      - name: Upload test results to GitHub
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results
          path: packages/*/test-report.junit.xml
          retention-days: 7

      - name: Prepare coverage reports
        run: |
          mkdir -p coverage-input
          for package in packages/*/; do
            package_name=$(basename "$package")
            coverage_dir="$package/coverage"
            coverage_json="$coverage_dir/coverage-final.json"

            if [ -f "$coverage_json" ]; then
              mkdir -p "coverage-input/$package_name"
              cp "$coverage_json" "coverage-input/$package_name/coverage-final.json"
              echo "Prepared coverage for $package_name"
            else
              echo "Skipping $package_name: coverage-final.json not found"
            fi
          done

      - name: Merge coverage reports
        uses: selfagency/merge-coverage@4f847ad20e457b1b08b73acd5e8de2fca504385c
        with:
          source: ${{ github.workspace }}
          coverage-reports: ${{ github.workspace }}/coverage-input
          output-folder: ${{ github.workspace }}/coverage
          formats: lcov

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: ${{ github.workspace }}/coverage/lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-cli-tests:
    name: CLI E2E (tui-test)
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI package (deps first)
        run: pnpm turbo run build --filter @agentsy/cli

      - name: Run CLI E2E tests
        run: pnpm --filter @agentsy/cli test:e2e:dev
        env:
          CI: true

      - name: Upload tui-test traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tui-traces
          path: packages/cli/tui-traces/
          retention-days: 7
