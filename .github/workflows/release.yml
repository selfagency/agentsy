name: Release

on:
  push:
    tags: ['@agentsy/*@*', 'v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-release:
    name: Detect package and version from tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read

    outputs:
      package_name: ${{ steps.parse.outputs.package_name }}
      package_dir: ${{ steps.parse.outputs.package_dir }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      is_per_package: ${{ steps.parse.outputs.is_per_package }}

    steps:
      - name: Parse tag or workflow input
        id: parse
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Releases are triggered only by tag pushes.
            // Use: git tag @agentsy/vscode@0.2.0 && git push origin @agentsy/vscode@0.2.0
            // Or use: pnpm release @agentsy/vscode 0.2.0
            const tag = context.ref.replace('refs/tags/', '');

            // Parse tag: either "@scope/package@version" or "v1.2.3" (root monorepo version)
            const perPackageMatch = tag.match(/^(@[^/]+\/[^@]+)@(.+)$/);
            const rootMatch = tag.match(/^v(\d+\.\d+\.\d+.*)$/);

            let isPerPackage = false;
            if (perPackageMatch) {
              [, packageName, version] = perPackageMatch;
              isPerPackage = true;
            } else if (rootMatch) {
              version = rootMatch[1];
              packageName = null;
            } else {
              core.info(`Tag '${tag}' is not a release tag; skipping.`);
              core.setOutput('tag', '');
              return;
            }

            // Resolve package directory
            let packageDir = null;
            if (isPerPackage) {
              packageDir = packageName.replace(/^@[^/]+\//, '');
              core.info(`Per-package release: ${packageName} version ${version} (dir: packages/${packageDir})`);
            } else {
              core.info(`Root release: version ${version}`);
            }

            // Verify tag matches latest main
            const refData = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            const refObj = refData.data.object;
            const taggedSha =
              refObj.type === 'tag'
                ? (await github.rest.git.getTag({ owner, repo, tag_sha: refObj.sha })).data.object.sha
                : refObj.sha;

            // Note: We don't check if tag points to the absolute latest main,
            // because that would block concurrent releases (if two commits land on main
            // close together, the first tag still points to a passing commit, but this
            // check would reject it as soon as main advances). Instead, we just verify
            // the tag commit passed CI and is on main (checked above with branch query).

            // Verify CI passed
            const requiredWorkflows = ['Test & Build'];
            let ciValidationSha = taggedSha;

            if (isPerPackage) {
              const commitResp = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: taggedSha,
              });

              const changedFiles = (commitResp.data.files ?? []).map(file => file.filename);
              const metadataOnlyFiles = [
                `packages/${packageDir}/package.json`,
                `packages/${packageDir}/CHANGELOG.md`,
              ];

              const isMetadataOnlyCommit =
                changedFiles.length > 0 &&
                changedFiles.every(filename => metadataOnlyFiles.includes(filename));

              if (isMetadataOnlyCommit) {
                const parentSha = commitResp.data.parents?.[0]?.sha;
                if (!parentSha) {
                  core.setFailed('Release blocked: metadata-only release commit has no parent commit to validate.');
                  return;
                }

                ciValidationSha = parentSha;
                core.info(
                  `Metadata-only release commit detected for ${packageName}. ` +
                  `Validating required workflows on parent commit ${parentSha.slice(0, 7)} instead of tag commit ${taggedSha.slice(0, 7)}.`
                );
              }
            }

            for (const workflowName of requiredWorkflows) {
              const workflowsResp = await github.rest.actions.listRepoWorkflows({
                owner,
                repo,
                per_page: 100,
              });

              const workflow = workflowsResp.data.workflows.find(w => w.name === workflowName);
              if (!workflow) {
                core.setFailed(`Release blocked: workflow '${workflowName}' not found.`);
                return;
              }

              const runsResp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                branch: 'main',
                head_sha: ciValidationSha,
                status: 'completed',
                per_page: 10,
              });

              const run = runsResp.data.workflow_runs[0];
              if (!run || run.conclusion !== 'success') {
                core.setFailed(
                  `Release blocked: workflow '${workflowName}' must pass on main for commit ${ciValidationSha}.`
                );
                return;
              }
            }

            const isPrerelease = version.includes('-');
            core.info(`✅ Release ready: ${tag}`);
            core.setOutput('package_name', packageName);
            core.setOutput('package_dir', packageDir);
            core.setOutput('version', version);
            core.setOutput('tag', tag);
            core.setOutput('is_prerelease', isPrerelease);
            core.setOutput('is_per_package', isPerPackage);

  release:
    name: Build and Release
    needs: [detect-release, verify-publish-readiness]
    if: needs.detect-release.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.detect-release.outputs.tag }}
          fetch-depth: 0

      - name: Generate release notes
        id: changelog_notes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = '${{ needs.detect-release.outputs.tag }}';

            const tagsResp = await github.rest.repos.listTags({
              owner,
              repo,
              per_page: 100,
            });
            const tags = tagsResp.data;

            let previousTag = '';

            if ('${{ needs.detect-release.outputs.is_per_package }}' === 'true') {
              const packageName = '${{ needs.detect-release.outputs.package_name }}';
              // Find previous tag for same package
              previousTag =
                tags
                  .map(tag => tag.name)
                  .filter(name => name.startsWith(`${packageName}@`) && name !== currentTag)
                  .sort((a, b) => {
                    const parseVer = v => {
                      const version = v.slice(v.lastIndexOf('@') + 1);
                      return version.split('.').map(Number);
                    };
                    const [aMaj = 0, aMin = 0, aPatch = 0] = parseVer(a);
                    const [bMaj = 0, bMin = 0, bPatch = 0] = parseVer(b);
                    return aMaj - bMaj || aMin - bMin || aPatch - bPatch;
                  })
                  .at(-1) ?? '';
            } else {
              // Root release: find previous root tag
              previousTag =
                tags
                  .map(tag => tag.name)
                  .filter(name => name.startsWith('v') && !name.includes('@') && name !== currentTag)
                  .sort((a, b) => {
                    const parseVer = v => v.replace(/^v/, '').split('.').map(Number);
                    const [aMaj, aMin, aPatch] = parseVer(a);
                    const [bMaj, bMin, bPatch] = parseVer(b);
                    return aMaj - bMaj || aMin - bMin || aPatch - bPatch;
                  })
                  .at(-1) ?? '';
            }

            const notesResponse = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: currentTag,
              ...(previousTag ? { previous_tag_name: previousTag } : {}),
              target_commitish: 'main',
            });

            core.info(
              previousTag
                ? `Generated notes from ${previousTag} to ${currentTag}.`
                : `Generated notes for ${currentTag}.`
            );

            core.setOutput('previous_tag', previousTag);
            core.setOutput('notes', notesResponse.data.body ?? '');

      - name: Write release notes to file
        run: printf '%s' "$RELEASE_NOTES" > release-notes.md
        env:
          RELEASE_NOTES: ${{ steps.changelog_notes.outputs.notes }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm CLI supports trusted publishing (>=11.5.1)
        run: |
          set -euo pipefail
          version_is_supported() {
            node -e "
              const [maj = 0, min = 0, patch = 0] = (process.argv[1] || '')
                .split('.')
                .map(v => Number.parseInt(v, 10));
              const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && patch >= 1)));
              process.exit(ok ? 0 : 1);
            " "$1"
          }

          CURRENT_NPM="$(npm --version)"
          echo "Current npm: ${CURRENT_NPM}"
          echo "npm path: $(command -v npm)"

          if ! version_is_supported "${CURRENT_NPM}"; then
            echo "Installing npm@^11.5.1 for trusted publishing support"
            npm install -g npm@^11.5.1
          fi

          FINAL_NPM="$(npm --version)"
          echo "Final npm: ${FINAL_NPM}"
          echo "npm path: $(command -v npm)"

          if ! version_is_supported "${FINAL_NPM}"; then
            echo "❌ npm ${FINAL_NPM} does not meet trusted publishing minimum (>=11.5.1)."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Write dist package.json for per-package release
        if: needs.detect-release.outputs.is_per_package == 'true'
        run: node scripts/write-dist-package.js "packages/${{ needs.detect-release.outputs.package_dir }}"

      - name: Write dist package.json for root packages
        if: needs.detect-release.outputs.is_per_package != 'true'
        run: |
          node scripts/write-dist-package.js packages/core
          node scripts/write-dist-package.js packages/vscode

      - name: Publish per-package release
        if: needs.detect-release.outputs.is_per_package == 'true'
        run: |
          set -euo pipefail

          dump_npm_debug_log() {
            local latest_log
            latest_log="$(ls -t /home/runner/.npm/_logs/*-debug-*.log 2>/dev/null | head -n1 || true)"
            if [[ -n "${latest_log}" && -f "${latest_log}" ]]; then
              echo "📄 npm debug log: ${latest_log}"
              echo "----- npm debug log (last 120 lines) -----"
              tail -n 120 "${latest_log}" || true
              echo "------------------------------------------"
            else
              echo "ℹ️ No npm debug log found in /home/runner/.npm/_logs"
            fi
          }

          publish_with_diagnostics() {
            local pkg_dir="$1"
            local dist_tag="$2"

            set +e
            npm publish "${pkg_dir}" --access public --tag="${dist_tag}" --provenance
            local publish_exit=$?
            set -e

            if [[ ${publish_exit} -ne 0 ]]; then
              echo "❌ npm publish failed (exit ${publish_exit})."
              echo "ℹ️ Diagnostic context: trusted publishing uses OIDC + provenance; failures after provenance often indicate package authorization mismatch in npm registry settings."
              dump_npm_debug_log
              exit ${publish_exit}
            fi
          }

          PACKAGE_DIR="packages/${{ needs.detect-release.outputs.package_dir }}"
          echo "📤 Publishing ${{ needs.detect-release.outputs.package_name }}@${{ needs.detect-release.outputs.version }}..."
          DIST_TAG="$([[ '${{ needs.detect-release.outputs.is_prerelease }}' == 'true' ]] && echo 'prerelease' || echo 'latest')"
          publish_with_diagnostics "$PACKAGE_DIR/dist" "$DIST_TAG"

      - name: Publish root monorepo release
        if: needs.detect-release.outputs.is_per_package != 'true'
        run: |
          set -euo pipefail

          dump_npm_debug_log() {
            local latest_log
            latest_log="$(ls -t /home/runner/.npm/_logs/*-debug-*.log 2>/dev/null | head -n1 || true)"
            if [[ -n "${latest_log}" && -f "${latest_log}" ]]; then
              echo "📄 npm debug log: ${latest_log}"
              echo "----- npm debug log (last 120 lines) -----"
              tail -n 120 "${latest_log}" || true
              echo "------------------------------------------"
            else
              echo "ℹ️ No npm debug log found in /home/runner/.npm/_logs"
            fi
          }

          publish_with_diagnostics() {
            local pkg_dir="$1"
            local dist_tag="$2"

            set +e
            npm publish "${pkg_dir}" --access public --tag="${dist_tag}" --provenance
            local publish_exit=$?
            set -e

            if [[ ${publish_exit} -ne 0 ]]; then
              echo "❌ npm publish failed for ${pkg_dir} (exit ${publish_exit})."
              echo "ℹ️ Diagnostic context: trusted publishing uses OIDC + provenance; failures after provenance often indicate package authorization mismatch in npm registry settings."
              dump_npm_debug_log
              exit ${publish_exit}
            fi
          }

          echo "📤 Publishing all packages..."
          DIST_TAG="$([[ '${{ needs.detect-release.outputs.is_prerelease }}' == 'true' ]] && echo 'prerelease' || echo 'latest')"
          publish_with_diagnostics ./packages/core/dist "$DIST_TAG"
          publish_with_diagnostics ./packages/vscode/dist "$DIST_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.detect-release.outputs.tag }}
          body_path: release-notes.md
          files: '*.tgz'
          draft: false
          prerelease: ${{ needs.detect-release.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-publish-readiness:
    name: Verify trusted publishing readiness
    needs: detect-release
    if: needs.detect-release.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.detect-release.outputs.tag }}

      - name: Verify release state and package repository URL
        shell: bash
        env:
          IS_PER_PACKAGE: ${{ needs.detect-release.outputs.is_per_package }}
          PACKAGE_NAME: ${{ needs.detect-release.outputs.package_name }}
          PACKAGE_DIR: ${{ needs.detect-release.outputs.package_dir }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${IS_PER_PACKAGE}" != "true" ]]; then
            echo "Root tag release detected; skipping per-package trusted publishing gate."
            exit 0
          fi

          node scripts/trusted-publish-readiness.js \
            --package-name "${PACKAGE_NAME}" \
            --package-dir "packages/${PACKAGE_DIR}" \
            --expected-repo "${REPOSITORY}" \
            --release-state-path "config/release-state.json" \
            --workflow-filename "release.yml" \
            --expected-state "oidc-ready"
